<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chat</title>
</head>
<body>

<div id="chat"></div>

<input id="name" placeholder="name">
<input id="text" placeholder="message">
<button onclick="send()">Send</button>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://supabase.com/dashboard/project/jgpvltygligzcbirdved",  
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpncHZsdHlnbGlnemNiaXJkdmVkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzNTAxOTIsImV4cCI6MjA5NDkyNjE5Mn0.Z4eU8maqA9ZDwyAHCQ4jvPPnvG9iEMGssdPlZXx4nOs"
);

function add(m){
  const d = document.createElement("div");
  d.textContent = m.name + ": " + m.text;
  document.getElementById("chat").appendChild(d);
}

window.send = async function(){
  const name = document.getElementById("name").value || "anon";
  const text = document.getElementById("text").value;

  if(!text) return;

  await supabase.from("messages").insert([{ name, text }]);
  document.getElementById("text").value = "";
};

const { data } = await supabase
  .from("messages")
  .select("*")
  .order("created_at", { ascending: true });

data.forEach(add);

supabase
  .channel("chat")
  .on("postgres_changes",
    { event: "INSERT", table: "messages" },
    (p) => add(p.new)
  )
  .subscribe();

</script>

</body>
</html>
